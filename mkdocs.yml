site_name: diagrams-for-ai
site_description: AI-friendly architecture diagrams with grid-based positioning
repo_url: https://github.com/tomascorrea/diagrams-for-ai

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference: api.md
  - Available Icons: icons.md
  - Connection Styles: connection-styles.md
  - Clusters: clusters.md
